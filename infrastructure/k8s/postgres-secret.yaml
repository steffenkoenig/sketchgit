# ──────────────────────────────────────────────────────────────────────────────
# PostgreSQL credentials template – DO NOT commit real values.
#
# POSTGRES_PASSWORD must match the password in DATABASE_URL in secret.yaml.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: sketchgit
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: "sketchgit"
  POSTGRES_DB: "sketchgit"
  POSTGRES_PASSWORD: "CHANGE_ME"
