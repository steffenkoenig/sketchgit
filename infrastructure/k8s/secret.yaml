# ──────────────────────────────────────────────────────────────────────────────
# App secrets template – DO NOT commit real values.
#
# Before applying, replace every CHANGE_ME placeholder with a real value:
#   DATABASE_URL       – Full PostgreSQL connection URL
#   AUTH_SECRET        – Random string ≥ 32 characters (openssl rand -base64 32)
#   NEXTAUTH_URL       – Public URL where the app is reachable (e.g. https://sketchgit.example.com)
#   INVITATION_SECRET  – Random string ≥ 32 characters (openssl rand -hex 32)
#
# Recommended: manage this file with Sealed Secrets or the External Secrets
# Operator so that plaintext secrets are never stored in git.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: sketchgit-secret
  namespace: sketchgit
  labels:
    app.kubernetes.io/name: sketchgit
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://sketchgit:CHANGE_ME@postgres:5432/sketchgit"
  AUTH_SECRET: "CHANGE_ME_min_32_chars_use_openssl_rand_base64_32"
  NEXTAUTH_URL: "https://sketchgit.example.com"
  INVITATION_SECRET: "CHANGE_ME_min_32_chars_use_openssl_rand_hex_32___"

  # ── Optional: GitHub OAuth ────────────────────────────────────────────────
  # GITHUB_ID: "your-github-oauth-app-client-id"
  # GITHUB_SECRET: "your-github-oauth-app-client-secret"

  # ── Optional: Email (password reset via Resend) ───────────────────────────
  # RESEND_API_KEY: "re_xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # EMAIL_FROM: "SketchGit <noreply@example.com>"
