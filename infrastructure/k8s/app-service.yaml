apiVersion: v1
kind: Service
metadata:
  name: sketchgit
  namespace: sketchgit
  labels:
    app.kubernetes.io/name: sketchgit
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector:
    app: sketchgit
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
