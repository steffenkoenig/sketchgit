name: Deploy

on:
  push:
    tags: ["sketchgit-next-v*"]

env:
  IMAGE: ghcr.io/steffenkoenig/sketchgit

jobs:
  # ── Job 1: Build the Docker image and push it to GHCR ──────────────────────
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Primary tag: full commit SHA (unique, immutable)
          # Secondary tag: git tag name (e.g. v1.2.3) for human readability
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Update the k8s manifest and let ArgoCD sync ─────────────────────
  deploy:
    name: Update Kubernetes deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: write  # required to push the updated manifest back to git

    steps:
      # Check out the default branch so the manifest update is committed there
      # (the workflow is triggered by a tag push, so we explicitly target the
      # default branch rather than the detached-HEAD state of the tag).
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.repository.default_branch }}

      - name: Update image tag in Kubernetes manifests
        run: |
          NEW_IMAGE="${{ env.IMAGE }}:${{ github.sha }}"
          sed -i "s|image: ${{ env.IMAGE }}:.*|image: ${NEW_IMAGE}|g" \
            infrastructure/k8s/app-deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infrastructure/k8s/app-deployment.yaml
          # Skip the commit if the file did not actually change
          git diff --staged --quiet || git commit \
            -m "chore(deploy): update image tag to ${{ github.sha }} [skip ci]"
          git push origin ${{ github.event.repository.default_branch }}
