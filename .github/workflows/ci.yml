name: CI

on:
  push:
    branches: [main, "copilot/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests & type check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
